
# pale_rose_light
# A light Helix theme derived from the pale_rose lualine palette.
#
# Palette roles (light variant):
#   bl  = #ecdcdd  — base background
#   gl  = #ded3d3  — surface / gutter
#   gr  = #cdbdbd  — muted surface
#   na  = #484042  — normal fg (statusline label bg → strong dark text)
#   nb  = #c5a3a9  — normal b (dusty rose)
#   nc  = #e5d9df  — normal c (pale pinkish bg)
#   ia  = #463942  — insert label (deep plum)
#   ib  = #c58ea7  — insert b (warm rose)
#   ic  = #e5d4de  — insert c
#   va  = #2a3033  — visual label (dark slate)
#   vb  = #878fb9  — visual b (muted periwinkle)
#   vc  = #c7cfd9  — visual c (cool grey-blue)
#   ca  = #282530  — command label (near-black)
#   cb  = #9e97d0  — command b (soft lavender)
#   cc  = #cfc8e0  — command c (pale lavender)

# ── UI ────────────────────────────────────────────────────────────────────────

"ui.background"             = { fg = "na", bg = "bl" }
"ui.background.separator"   = { fg = "gr" }

"ui.statusline"             = { fg = "na", bg = "nc" }
"ui.statusline.inactive"    = { fg = "nb", bg = "gl" }
"ui.statusline.normal"      = { fg = "bl", bg = "na" }
"ui.statusline.insert"      = { fg = "bl", bg = "ia" }
"ui.statusline.select"      = { fg = "bl", bg = "va" }

"ui.cursor"                 = { fg = "bl", bg = "na" }
"ui.cursor.insert"          = { fg = "bl", bg = "ia" }
"ui.cursor.select"          = { fg = "bl", bg = "va" }
"ui.cursor.match"           = { fg = "na", bg = "vc", modifiers = ["bold"] }
"ui.cursor.primary"         = { fg = "bl", bg = "na" }
"ui.cursor.primary.insert"  = { fg = "bl", bg = "ia" }
"ui.cursor.primary.select"  = { fg = "bl", bg = "va" }

"ui.selection"              = { bg = "vc" }
"ui.selection.primary"      = { bg = "vb" }

"ui.linenr"                 = { fg = "gr" }
"ui.linenr.selected"        = { fg = "nb", modifiers = ["bold"] }

"ui.gutter"                 = { bg = "gl" }
"ui.gutter.selected"        = { bg = "nc" }

"ui.text"                   = { fg = "na" }
"ui.text.focus"             = { fg = "ca", modifiers = ["bold"] }
"ui.text.inactive"          = { fg = "gr" }
"ui.text.directory"         = { fg = "vb" }

"ui.menu"                   = { fg = "na", bg = "gl" }
"ui.menu.selected"          = { fg = "bl", bg = "nb" }
"ui.menu.scroll"            = { fg = "gr", bg = "gl" }

"ui.popup"                  = { fg = "na", bg = "nc" }
"ui.popup.info"             = { fg = "na", bg = "nc" }

"ui.window"                 = { fg = "gr" }

"ui.help"                   = { fg = "na", bg = "nc" }

"ui.highlight"              = { bg = "cc" }
"ui.highlight.frameline"    = { bg = "ic" }

"ui.virtual.ruler"          = { bg = "gl" }
"ui.virtual.whitespace"     = { fg = "gr" }
"ui.virtual.indent-guide"   = { fg = "gr" }
"ui.virtual.inlay-hint"     = { fg = "nb", bg = "gl" }
"ui.virtual.jump-label"     = { fg = "cb", modifiers = ["bold"] }
"ui.virtual.wrap"           = { fg = "gr" }

# ── Syntax ────────────────────────────────────────────────────────────────────

"variable"                  = { fg = "va" }
"variable.builtin"          = { fg = "va", modifiers = ["italic"] }
"variable.parameter"        = { fg = "ia" }
"variable.other.member"     = { fg = "na" }

"constant"                  = { fg = "ca" }
"constant.builtin"          = { fg = "ca", modifiers = ["bold"] }
"constant.character.escape" = { fg = "ib" }

"namespace"                 = { fg = "vb" }
"module"                    = { fg = "vb" }

"type"                      = { fg = "nb", modifiers = ["bold"] }
"type.builtin"              = { fg = "nb" }
"type.enum.variant"         = { fg = "ib" }

"constructor"               = { fg = "nb" }

"attribute"                 = { fg = "cb" }

"function"                  = { fg = "ia" }
"function.builtin"          = { fg = "ia", modifiers = ["italic"] }
"function.macro"            = { fg = "ib" }
"function.method"           = { fg = "ia" }
"function.method.private"   = { fg = "ia", modifiers = ["italic"] }
"function.special"          = { fg = "ia", modifiers = ["bold"] }

"tag"                       = { fg = "na" }
"tag.builtin"               = { fg = "nb" }
"tag.attribute"             = { fg = "vb" }

"keyword"                   = { fg = "va", modifiers = ["bold"] }
"keyword.control"           = { fg = "va" }
"keyword.control.conditional" = { fg = "va" }
"keyword.control.import"    = { fg = "cb" }
"keyword.control.return"    = { fg = "va", modifiers = ["italic"] }
"keyword.operator"          = { fg = "na" }
"keyword.directive"         = { fg = "cb" }
"keyword.function"          = { fg = "va", modifiers = ["bold"] }

"operator"                  = { fg = "na" }

"punctuation"               = { fg = "nb" }
"punctuation.delimiter"     = { fg = "nb" }
"punctuation.bracket"       = { fg = "na" }
"punctuation.special"       = { fg = "ib" }

"comment"                   = { fg = "gr", modifiers = ["italic"] }
"comment.block.documentation" = { fg = "nb", modifiers = ["italic"] }

"string"                    = { fg = "vb" }
"string.regexp"             = { fg = "ib" }
"string.special"            = { fg = "cb" }
"string.special.url"        = { fg = "vb", modifiers = ["underlined"] }

"number"                    = { fg = "ca" }
"number.float"              = { fg = "ca" }

"boolean"                   = { fg = "ca", modifiers = ["bold"] }

"label"                     = { fg = "ib" }

# ── Diagnostics ───────────────────────────────────────────────────────────────

"diagnostic"                = { modifiers = ["underlined"] }
"diagnostic.error"          = { fg = "error" }
"diagnostic.warning"        = { fg = "warning" }
"diagnostic.info"           = { fg = "info" }
"diagnostic.hint"           = { fg = "hint" }
"diagnostic.unnecessary"    = { modifiers = ["dim"] }
"diagnostic.deprecated"     = { modifiers = ["crossed_out"] }

"error"                     = { fg = "error" }
"warning"                   = { fg = "warning" }
"info"                      = { fg = "info" }
"hint"                      = { fg = "hint" }

# ── Diff ──────────────────────────────────────────────────────────────────────

"diff.plus"                 = { fg = "diff_add" }
"diff.minus"                = { fg = "diff_delete" }
"diff.delta"                = { fg = "diff_change" }

# ── Markup ────────────────────────────────────────────────────────────────────

"markup.heading"            = { fg = "va", modifiers = ["bold"] }
"markup.heading.1"          = { fg = "va", modifiers = ["bold"] }
"markup.heading.2"          = { fg = "na", modifiers = ["bold"] }
"markup.heading.3"          = { fg = "nb", modifiers = ["bold"] }
"markup.list"               = { fg = "ib" }
"markup.bold"               = { modifiers = ["bold"] }
"markup.italic"             = { modifiers = ["italic"] }
"markup.strikethrough"      = { modifiers = ["crossed_out"] }
"markup.link.url"           = { fg = "vb", modifiers = ["underlined"] }
"markup.link.label"         = { fg = "cb" }
"markup.link.text"          = { fg = "na" }
"markup.raw"                = { fg = "ia", bg = "gl" }
"markup.raw.block"          = { fg = "ia", bg = "nc" }
"markup.quote"              = { fg = "nb", modifiers = ["italic"] }

# ── Palette ───────────────────────────────────────────────────────────────────

[palette]
# Base surfaces
bl  = "#acbdbd"
gl  = "#ded3d3"
gr  = "#9aabab"

# Normal mode
na  = "#484042"
nb  = "#c5a3a9"
nc  = "#e5d9df"

# Insert mode
ia  = "#463942"
ib  = "#c58ea7"
ic  = "#e5d4de"

# Visual mode
va  = "#2a3033"
vb  = "#878fb9"
vc  = "#c7cfd9"

# Command mode
ca  = "#282530"
cb  = "#9e97d0"
cc  = "#cfc8e0"

# Semantic
error        = "#8c3a3a"
warning      = "#7a5c2e"
info         = "#2e4f6a"
hint         = "#4a5568"
diff_add     = "#3a6644"
diff_delete  = "#8c3a3a"
diff_change  = "#2e4f6a"
