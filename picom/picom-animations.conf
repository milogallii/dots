# Animations for NORMAL windows.
{
    match = "window_type = 'normal'";
    animations = (
        {
            triggers = [ "open", "show" ];
            preset = "appear";
            scale = 0.8;
            duration = 0.3;
        },
        {
            triggers = [ "close", "hide" ];
            preset = "fly-out";
            scale = 0.8;
            duration = 0.2;
        },
        {
            triggers = [ "geometry" ];
            preset = "geometry-change";
            duration = 0.2;
        }
    )
},
{
    match = "class_g = 'Dunst'";
    animations = (
    {
        triggers = ["close", "hide"];
        preset = "fly-out";	#-dunst-close-preset
        direction = "down";	#-dunst-close-direction
        duration = 0.8;
    }
)
},
{
    match = "class_g = 'dmenu'";
    animations = (
    {
        triggers = ["close", "hide"];
        preset = "fly-out";	#-dunst-close-preset
        direction = "up";	#-dunst-close-direction
        duration = 0.2;
    },
    {
        triggers = ["open", "show"];
        preset = "fly-in";
        direction = "up";
        duration = 0.2;
    }
    )
},
